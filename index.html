<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>模拟来电</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: #000;
            color: white;
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            position: relative;
            transition: opacity 1s ease-out; /* 添加淡出动画 */
        }

        .bg-image {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(135deg, #2c3e50, #000000);
            filter: blur(20px) brightness(0.6);
            z-index: -1;
        }

        .status-bar {
            width: 100%;
            padding: 15px 25px;
            display: flex;
            justify-content: space-between;
            font-size: 14px;
            font-weight: 600;
            z-index: 10;
            margin-top: 10px;
        }

        .caller-info {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            z-index: 10;
            padding-bottom: 50px;
        }

        .avatar {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            background-color: #ccc;
            margin-bottom: 20px;
            background-image: url('https://cdn-icons-png.flaticon.com/512/847/847969.png');
            background-size: 70%;
            background-repeat: no-repeat;
            background-position: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }

        .caller-name {
            font-size: 28px;
            font-weight: 600;
            margin-bottom: 10px;
            text-shadow: 0 2px 4px rgba(0,0,0,0.5);
        }

        .status-text {
            font-size: 18px;
            font-weight: 400;
            opacity: 0.9;
            min-height: 27px;
            color: #eee;
        }

        .action-buttons {
            width: 100%;
            padding: 40px 20px 60px;
            display: flex;
            justify-content: space-around;
            align-items: center;
            z-index: 10;
            transition: opacity 0.3s ease;
        }

        .btn {
            width: 70px;
            height: 70px;
            border-radius: 50%;
            border: none;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            transition: transform 0.2s;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }

        .btn:active {
            transform: scale(0.95);
        }

        .btn-decline {
            background-color: #ff3b30;
            color: white;
        }

        .btn-answer {
            background-color: #34c759;
            color: white;
        }

        .btn svg {
            width: 30px;
            height: 30px;
        }

        .btn-label {
            position: absolute;
            margin-top: 80px;
            font-size: 13px;
            font-weight: 500;
            text-shadow: 0 1px 2px rgba(0,0,0,0.5);
            width: 100px;
            text-align: center;
            pointer-events: none;
        }
        
        .button-wrapper {
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* 新增：挂断后的提示文字样式 */
        .end-message {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 24px;
            font-weight: 600;
            color: #aaa;
            opacity: 0;
            transition: opacity 0.5s ease;
            z-index: 20;
            text-align: center;
        }

        .end-message.show {
            opacity: 1;
        }

    </style>
</head>
<body>

    <div class="bg-image"></div>

    <div class="status-bar">
        <span id="carrier">中国移动</span>
        <span id="clock">12:00</span>
        <span id="battery">🔋 100%</span>
    </div>

    <div class="caller-info">
        <div class="avatar"></div>
        <h1 class="caller-name" id="caller-name">母亲</h1> <!-- 你可以改成任意名字 -->
        <div class="status-text" id="status-text">正在呼叫...</div>
    </div>

    <div class="action-buttons" id="actionButtons">
        <div class="button-wrapper" id="declineWrapper">
            <button class="btn btn-decline" onclick="handleDecline()">
                <svg viewBox="0 0 24 24"><path fill="currentColor" d="M12 9c-1.6 0-3.15.25-4.6.72v3.1c0 .39-.23.74-.56.9-.98.49-1.87 1.12-2.66 1.85-.18.18-.43.28-.7.28-.28 0-.53-.11-.71-.29L.29 13.08c-.18-.17-.29-.42-.29-.7 0-.28.11-.53.29-.71C3.34 8.36 7.46 6 12 6s8.66 2.36 11.71 5.67c.18.18.29.43.29.71 0 .28-.11.53-.29.71l-2.48 2.48c-.18.18-.43.29-.71.29-.27 0-.52-.11-.7-.28-.79-.74-1.69-1.36-2.67-1.85-.33-.16-.56-.5-.56-.9v-3.1C15.15 9.25 13.6 9 12 9z"/></svg>
            </button>
            <span class="btn-label">挂断</span>
        </div>

        <div class="button-wrapper" id="answerWrapper">
            <button class="btn btn-answer" onclick="handleAnswer()">
                <svg viewBox="0 0 24 24"><path fill="currentColor" d="M20.01 15.38c-1.23 0-2.42-.2-3.53-.56a.977.977 0 00-1.01.24l-1.57 1.97c-2.83-1.44-5.15-3.75-6.59-6.59l1.97-1.57c.26-.26.35-.62.25-1.01A11.36 11.36 0 009.5 4.5c0-.55-.45-1-1-1H4.5c-.55 0-1 .45-1 1 0 9.39 7.61 17 17 17 .55 0 1-.45 1-1v-4.5c0-.55-.45-1-1-1z"/></svg>
            </button>
            <span class="btn-label">接听</span>
        </div>
    </div>

    <!-- 新增：挂断后显示的提示 -->
    <div class="end-message" id="endMessage">通话已结束</div>

    <!-- ⚠️ 请替换为你的录音文件链接 -->
    <audio id="callAudio" src="https://cdn.jsdelivr.net/gh/monokumas/qrcodetest/3月15日.mp3"></audio>

    <script>
        let callTimerInterval = null;
        let secondsElapsed = 0;
        
        const audio = document.getElementById('callAudio');
        const actionButtonsDiv = document.getElementById('actionButtons');
        const answerWrapper = document.getElementById('answerWrapper');
        const declineWrapper = document.getElementById('declineWrapper');
        const callerNameEl = document.querySelector('.caller-name');
        const statusTextEl = document.getElementById('status-text');
        const endMessageEl = document.getElementById('endMessage');
        const bodyEl = document.body;

        function updateClock() {
            const now = new Date();
            const hours = String(now.getHours()).padStart(2, '0');
            const minutes = String(now.getMinutes()).padStart(2, '0');
            document.getElementById('clock').textContent = `${hours}:${minutes}`;
        }
        setInterval(updateClock, 1000);
        updateClock();

        function formatTime(seconds) {
            const mins = Math.floor(seconds / 60);
            const secs = seconds % 60;
            return `${String(mins).padStart(2, '0')}:${String(secs).padStart(2, '0')}`;
        }

        function handleAnswer() {
            if (answerWrapper) {
                answerWrapper.style.display = 'none';
            }

            callerNameEl.textContent = "通话中...";
            statusTextEl.textContent = "00:00";
            
            secondsElapsed = 0;
            if (callTimerInterval) clearInterval(callTimerInterval);
            
            callTimerInterval = setInterval(() => {
                secondsElapsed++;
                statusTextEl.textContent = formatTime(secondsElapsed);
            }, 1000);

            audio.currentTime = 0;
            audio.play().catch(e => {
                console.error('播放失败:', e);
                alert('浏览器拦截了自动播放，请点击页面任意位置。');
            });

            audio.onended = function() {
                setTimeout(() => {
                    handleDecline();
                }, 500);
            };
        }

        function handleDecline() {
            audio.pause();
            audio.currentTime = 0;

            if (callTimerInterval) {
                clearInterval(callTimerInterval);
                callTimerInterval = null;
            }

            // 更新界面
            callerNameEl.textContent = "母亲"; // 保持原名
            statusTextEl.textContent = "已挂断";

            // 隐藏所有操作按钮
            if (actionButtonsDiv) {
                actionButtonsDiv.style.display = 'none';
            }

            // 显示“通话已结束”提示
            //endMessageEl.classList.add('show');

            // 2秒后开始淡出整个页面
            setTimeout(() => {
                bodyEl.style.opacity = '0'; // 触发CSS过渡动画

                // 动画完成后，可选：跳转到其他页面或什么都不做
                setTimeout(() => {
                    // 如果你想彻底关闭或跳转，可以在这里加
                    // window.location.href = "https://your-homepage.com";
                    // 或者什么都不做，让用户手动关闭
                }, 1000); // 等淡出动画完成（1秒）

            }, 2000); // 2秒后开始淡出
        }
    </script>
</body>
</html>
